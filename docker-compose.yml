version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=inventory_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://inventory_user:password@db:5432/inventory
      # Dev-only secret. Production deploys MUST override JWT_SECRET_KEY with a
      # high-entropy value (e.g. `openssl rand -hex 32`) via the runtime env.
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-only-not-for-production-change-me}
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
